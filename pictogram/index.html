<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Triangle des Voyelles</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <h1>Les Voyelles</h1>
    <p>Cliquez sur une voyelle pour l'écouter</p>
    <svg viewBox="0 0 300 400" preserveAspectRatio="xMidYMid meet">
      <g class="triangle-inner">
      <!-- lines -->
      <line x1="150" y1="80" x2="30" y2="370" class="guide"/>
      <line x1="150" y1="80" x2="270" y2="370" class="guide"/>
      <line x1="30" y1="370" x2="270" y2="370" class="guide"/>
      <!-- center vertical line -->
      <line x1="150" y1="80" x2="150" y2="370" class="guide" />
      <!-- horizontal line (upper third) -->
      <line x1="100" y1="195" x2="200" y2="195" class="guide" />
      <!-- horizontal line (lower third) -->
      <line x1="70" y1="275" x2="230" y2="275" class="guide" />
      <!-- vowels -->
      <!-- upper intersections -->
      <g onclick="play('o')" class="vowel">
        <circle cx="100" cy="195" r="20" fill="#5dade2"/>
      </g>
      <g onclick="play('oe')" class="vowel">
        <circle cx="150" cy="195" r="20" fill="#7ed957"/>
      </g>
      <g onclick="play('è')" class="vowel">
        <circle cx="200" cy="195" r="20" fill="#ff7eb9"/>
      </g>
      <!-- middle -->
      <g onclick="play('eu')" class="vowel">
        <circle cx="150" cy="275" r="20" fill="#00b894"/>
      </g>
      <!-- lower intersections -->
      <g onclick="play('au')" class="vowel">
        <circle cx="70" cy="275" r="20" fill="#4a6bd6"/>
      </g>
      <g onclick="play('é')" class="vowel">
        <circle cx="230" cy="275" r="20" fill="#ff6f3c"/>
      </g>
      <!-- bottom -->
      <g onclick="play('ou')" class="vowel">
        <circle cx="30" cy="370" r="20" fill="#2ec4b6"/>
      </g>
      <g onclick="play('u')" class="vowel">
        <circle cx="150" cy="370" r="20" fill="#ffd93d"/>
      </g>
      <g onclick="play('i')" class="vowel">
        <circle cx="270" cy="370" r="20" fill="#ff4d4d"/>
      </g>
      <!-- top  -->
      <g onclick="play('a')" class="vowel">
        <circle cx="150" cy="80" r="20" fill="#9b59b6"/>
      </g>
      <!-- nasal vowels -->
      <g onclick="play('an')" class="vowel">
        <circle cx="150" cy="30" r="20" fill="#e6a8d7"/>
      </g>
      <g onclick="play('on')" class="vowel">
        <circle cx="60" cy="130" r="20" fill="#adceea"/>
      </g>
      <g onclick="play('in')" class="vowel">
        <circle cx="240" cy="130" r="20" fill="#f3b795"/>
      </g>
          </g>
    </svg>
    <footer class="attribution">
      <p>Développé par <a href="https://verzone.ch" target="_blank" rel="noopener noreferrer">Hugo Verzone</a> | 
        Concept du triangle des voyelles par <a href="https://wp.unil.ch/ficellesapprendre/sophia-smajlovic-1142/" target="_blank" rel="noopener noreferrer">Sophia Smajlovic (UNIL)</a> | 
        Audio de prononciation provenant de <a href="https://fonetix.org/fr/etudier/ressources" target="_blank" rel="noopener noreferrer">Fonetix.org</a></p>
    </footer>
    <script>
function play(sound){
let audioPath = "../assets/audio/vowels_fonetix_without_example/";
let audio = new Audio(audioPath + sound + ".mp3");
audio.play();
}
// Overlay PNG pictograms from pictograms folder
(function addPictograms(){
const size = 28;
document.querySelectorAll('g.vowel').forEach(g => {
const onclick = g.getAttribute('onclick') || '';
const match = onclick.match(/play\('(.+?)'\)/);
if (!match) return;
const sound = match[1];
const circle = g.querySelector('circle');
if (!circle) return;
const cx = parseFloat(circle.getAttribute('cx')) || 0;
const cy = parseFloat(circle.getAttribute('cy')) || 0;
const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
img.setAttribute('href', `pictograms/${sound}.png`);
img.setAttribute('x', cx - size / 2);
img.setAttribute('y', cy - size / 2);
img.setAttribute('width', size);
img.setAttribute('height', size);
img.setAttribute('preserveAspectRatio', 'xMidYMid meet');
img.setAttribute('onerror', "this.style.display='none'");
// Draw pictogram on top of the circle
g.appendChild(img);
});
})();
    </script>
  </body>
</html>
