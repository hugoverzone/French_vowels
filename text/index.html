<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Triangle des Voyelles</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <div class="top-banner">
      <a href="https://www.evam.ch/" target="_blank" rel="noopener noreferrer">
        <img src="../assets/images/logo_EVAM.png" alt="Logo" />
      </a>
    </div>
    <h1>Les Voyelles</h1>
    <p>Cliquez sur une voyelle pour l'écouter</p>
    <div class="audio-toggle">
      <label>
        <input type="checkbox" id="audio-toggle">
        Avec exemples
      </label>
    </div>
    <svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
      <g class="triangle-inner">
      <!-- lines -->
      <line x1="200" y1="75" x2="80" y2="365" class="guide"/>
      <line x1="200" y1="75" x2="320" y2="365" class="guide"/>
      <line x1="80" y1="365" x2="320" y2="365" class="guide"/>
      <!-- center vertical line -->
      <line x1="200" y1="75" x2="200" y2="365" class="guide" />
      <!-- horizontal line (upper third) -->
      <line x1="150" y1="190" x2="250" y2="190" class="guide" />
      <!-- horizontal line (lower third) -->
      <line x1="120" y1="270" x2="280" y2="270" class="guide" />
      <!-- vowels -->
      <!-- upper intersections -->
      <g onclick="play('o')" class="vowel">
        <circle cx="150" cy="190" r="20" fill="#5dade2"/>
        <text dominant-baseline="middle" x="150" y="190" text-anchor="middle">o</text>
      </g>
      <g onclick="play('oe')" class="vowel">
        <circle cx="200" cy="190" r="20" fill="#7ed957"/>
        <text dominant-baseline="middle" x="200" y="190" text-anchor="middle">œ</text>
      </g>
      <g onclick="play('è')" class="vowel">
        <circle cx="250" cy="190" r="20" fill="#ff7eb9"/>
        <text dominant-baseline="middle" x="250" y="190" text-anchor="middle">è</text>
      </g>
      <!-- middle -->
      <g onclick="play('eu')" class="vowel">
        <circle cx="200" cy="270" r="20" fill="#00b894"/>
        <text dominant-baseline="middle" x="200" y="270" text-anchor="middle">eu</text>
      </g>
      <!-- lower intersections -->
      <g onclick="play('au')" class="vowel">
        <circle cx="120" cy="270" r="20" fill="#4a6bd6"/>
        <text dominant-baseline="middle" x="120" y="270" text-anchor="middle">au</text>
      </g>
      <g onclick="play('é')" class="vowel">
        <circle cx="280" cy="270" r="20" fill="#ff6f3c"/>
        <text dominant-baseline="middle" x="280" y="270" text-anchor="middle">é</text>
      </g>
      <!-- bottom -->
      <g onclick="play('ou')" class="vowel">
        <circle cx="80" cy="365" r="20" fill="#2ec4b6"/>
        <text dominant-baseline="middle" x="80" y="365" text-anchor="middle">ou</text>
      </g>
      <g onclick="play('u')" class="vowel">
        <circle cx="200" cy="365" r="20" fill="#ffd93d"/>
        <text dominant-baseline="middle" x="200" y="365" text-anchor="middle">u</text>
      </g>
      <g onclick="play('i')" class="vowel">
        <circle cx="320" cy="365" r="20" fill="#ff4d4d"/>
        <text dominant-baseline="middle" x="320" y="365" text-anchor="middle">i</text>
      </g>
      <!-- top  -->
      <g onclick="play('a')" class="vowel">
        <circle cx="200" cy="75" r="20" fill="#9b59b6"/>
        <text dominant-baseline="middle" x="200" y="75" text-anchor="middle">a</text>
      </g>
      <!-- nasal vowels -->
      <g onclick="play('an')" class="vowel">
        <circle cx="200" cy="25" r="20" fill="#e6a8d7"/>
        <text dominant-baseline="middle" x="200" y="25" text-anchor="middle">an</text>
      </g>
      <g onclick="play('on')" class="vowel">
        <circle cx="110" cy="125" r="20" fill="#adceea"/>
        <text dominant-baseline="middle" x="110" y="125" text-anchor="middle">on</text>
      </g>
      <g onclick="play('in')" class="vowel">
        <circle cx="290" cy="125" r="20" fill="#f3b795"/>
        <text dominant-baseline="middle" x="290" y="125" text-anchor="middle">in</text>
      </g>
          </g>
    </svg>
    <footer class="attribution">
      <p>Developed by <a href="https://verzone.ch" target="_blank" rel="noopener noreferrer">Hugo Verzone</a> | Vowel triangle concept by <a href="https://wp.unil.ch/ficellesapprendre/sophia-smajlovic-1142/" target="_blank" rel="noopener noreferrer">Sophia Smajlovic (UNIL)</a> | Pronunciation audio from <a href="https://fonetix.org/fr/etudier/ressources" target="_blank" rel="noopener noreferrer">Fonetix.org</a></p>
    </footer>
    <script>
function play(sound){
let audioPath = document.getElementById('audio-toggle').checked
  ? "../assets/audio/vowels_fonetix_with_example/"
  : "../assets/audio/vowels_fonetix_without_example/";
let audio = new Audio(audioPath + sound + ".mp3");
audio.play();
}
    </script>
  </body>
</html>
