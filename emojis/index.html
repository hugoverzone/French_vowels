<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Triangle des Voyelles</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <div class="top-banner">
      <a href="https://www.evam.ch/" target="_blank" rel="noopener noreferrer">
        <img src="../assets/images/logo_EVAM.png" alt="Logo" />
      </a>
    </div>
    <h1>Les Voyelles</h1>
    <p>Cliquez sur une voyelle pour l'écouter</p>
    <svg viewBox="0 0 300 400" preserveAspectRatio="xMidYMid meet">
      <g class="triangle-inner">
      <!-- lines -->
      <line x1="150" y1="80" x2="30" y2="370" class="guide"/>
      <line x1="150" y1="80" x2="270" y2="370" class="guide"/>
      <line x1="30" y1="370" x2="270" y2="370" class="guide"/>
      <!-- center vertical line -->
      <line x1="150" y1="80" x2="150" y2="370" class="guide" />
      <!-- horizontal line (upper third) -->
      <line x1="100" y1="195" x2="200" y2="195" class="guide" />
      <!-- horizontal line (lower third) -->
      <line x1="70" y1="275" x2="230" y2="275" class="guide" />
      <!-- vowels -->
      <!-- upper intersections -->
      <g onclick="play('o')" class="vowel">
        <circle cx="100" cy="195" r="20" fill="#5dade2"/>
        <text dominant-baseline="middle" x="100" y="195" text-anchor="middle">🍎</text>
      </g>
      <g onclick="play('oe')" class="vowel">
        <circle cx="150" cy="195" r="20" fill="#7ed957"/>
        <text dominant-baseline="middle" x="150" y="195" text-anchor="middle">❤️</text>
      </g>
      <g onclick="play('è')" class="vowel">
        <circle cx="200" cy="195" r="20" fill="#ff7eb9"/>
        <text dominant-baseline="middle" x="200" y="195" text-anchor="middle">🥛</text>
      </g>
      <!-- middle -->
      <g onclick="play('eu')" class="vowel">
        <circle cx="150" cy="275" r="20" fill="#00b894"/>
        <text dominant-baseline="middle" x="150" y="275" text-anchor="middle">🔥</text>
      </g>
      <!-- lower intersections -->
      <g onclick="play('au')" class="vowel">
        <circle cx="70" cy="275" r="20" fill="#4a6bd6"/>
        <text dominant-baseline="middle" x="70" y="275" text-anchor="middle">🎁</text>
      </g>
      <g onclick="play('é')" class="vowel">
        <circle cx="230" cy="275" r="20" fill="#ff6f3c"/>
        <text dominant-baseline="middle" x="230" y="275" text-anchor="middle">☕</text>
      </g>
      <!-- bottom -->
      <g onclick="play('ou')" class="vowel">
        <circle cx="30" cy="370" r="20" fill="#2ec4b6"/>
        <text dominant-baseline="middle" x="30" y="370" text-anchor="middle">👨‍👩‍👦‍👦</text>
      </g>
      <g onclick="play('u')" class="vowel">
        <circle cx="150" cy="370" r="20" fill="#ffd93d"/>
        <text dominant-baseline="middle" x="150" y="370" text-anchor="middle">🫵</text>
      </g>
      <g onclick="play('i')" class="vowel">
        <circle cx="270" cy="370" r="20" fill="#ff4d4d"/>
        <text dominant-baseline="middle" x="270" y="370" text-anchor="middle">🥝</text>
      </g>
      <!-- top  -->
      <g onclick="play('a')" class="vowel">
        <circle cx="150" cy="80" r="20" fill="#9b59b6"/>
        <text dominant-baseline="middle" x="150" y="80" text-anchor="middle">🧔‍♂️</text>
      </g>
      <!-- nasal vowels -->
      <g onclick="play('an')" class="vowel">
        <circle cx="150" cy="30" r="20" fill="#e6a8d7"/>
        <text dominant-baseline="middle" x="150" y="30" text-anchor="middle">🦷</text>
      </g>
      <g onclick="play('on')" class="vowel">
        <circle cx="60" cy="130" r="20" fill="#adceea"/>
        <text dominant-baseline="middle" x="60" y="130" text-anchor="middle">🍬</text>
      </g>
      <g onclick="play('in')" class="vowel">
        <circle cx="240" cy="130" r="20" fill="#f3b795"/>
        <text dominant-baseline="middle" x="240" y="130" text-anchor="middle">🍞</text>
      </g>
          </g>
    </svg>
    <footer class="attribution">
      <p>Developed by <a href="https://verzone.ch" target="_blank" rel="noopener noreferrer">Hugo Verzone</a> | Vowel triangle concept by <a href="https://wp.unil.ch/ficellesapprendre/sophia-smajlovic-1142/" target="_blank" rel="noopener noreferrer">Sophia Smajlovic (UNIL)</a> | Pronunciation audio from <a href="https://fonetix.org/fr/etudier/ressources" target="_blank" rel="noopener noreferrer">Fonetix.org</a></p>
    </footer>
    <script>
function play(sound){
let audio = new Audio("../assets/audio/vowels_fonetix_without_example/" + sound + ".mp3");
audio.play();
}
    </script>
  </body>
</html>
